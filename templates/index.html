<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gesture Brightness Control</title>
    <link rel="stylesheet" href="/static/style.css">
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
</head>
<body>
    <!-- Custom Camera Access Modal -->
    <div id="camera-modal" class="modal-overlay">
        <div class="modal">
            <h2>Camera Permission</h2>
            <p>We need access to your camera to detect hand gestures. Please click the button below and then choose <strong>"Allow"</strong> when your browser prompts you.</p>
            <button id="grant-btn" class="btn btn-off" onclick="requestCameraAccess()">Grant Camera Access</button>
            <div id="loading-spinner" class="spinner" style="display: none;"></div>
        </div>
    </div>

    <div class="container">
        <a href="/" class="back-link">&larr; Back to Home</a>
        <h1>Gesture Brightness Control</h1>
        <p class="instructions">Pinch your index finger and thumb to adjust screen brightness.</p>
        <button id="toggle-btn" class="btn btn-off" onclick="toggleCamera()" disabled>Waiting for Camera...</button>
        <div class="video-container">
            <img id="video-feed" data-src="/video_feed" width="640" height="480" alt="Waiting for camera permission...">
            <div id="browser-stage" class="camera-stage" style="display:none;">
                <video id="browser-preview" class="camera-layer" width="640" height="480" autoplay playsinline muted></video>
                <canvas id="overlay-canvas" class="camera-layer" width="640" height="480"></canvas>
            </div>
        </div>
    </div>

    <script>
        let cameraStream = null;
        let backendMode = true;
        let handTracker = null;
        let trackingActive = false;
        let trackingBusy = false;
        let lastGestureCenter = null;
        let stillFrames = 0;
        let currentBrightness = 100;

        function getActiveCameraElement() {
            return document.getElementById('browser-preview') || document.getElementById('video-feed');
        }

        function getOverlayCanvas() {
            return document.getElementById('overlay-canvas');
        }

        function clearOverlay() {
            var canvas = getOverlayCanvas();
            if (!canvas) {
                return;
            }

            var context = canvas.getContext('2d');
            context.clearRect(0, 0, canvas.width, canvas.height);
        }

        function applyBrightness(value) {
            var brightness = Math.max(0, Math.min(100, Number(value)));
            var activeCamera = getActiveCameraElement();

            currentBrightness = brightness;

            if (activeCamera) {
                activeCamera.style.filter = 'brightness(' + (brightness / 100) + ')';
            }
        }

        function setGestureStatus(text) {
            var status = document.getElementById('gesture-status');
            if (status) {
                status.innerText = text;
            }
        }

        function drawOverlay(results, brightness) {
            var canvas = getOverlayCanvas();
            if (!canvas) {
                return;
            }

            var context = canvas.getContext('2d');
            context.save();
            context.clearRect(0, 0, canvas.width, canvas.height);
            context.translate(canvas.width, 0);
            context.scale(-1, 1);

            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                var landmarks = results.multiHandLandmarks[0];
                if (window.drawConnectors && window.drawLandmarks && window.HAND_CONNECTIONS) {
                    drawConnectors(context, landmarks, HAND_CONNECTIONS, { color: '#ffffff', lineWidth: 3 });
                    drawLandmarks(context, landmarks, { color: '#ff3b30', lineWidth: 1, radius: 4 });
                }

                var thumbTip = landmarks[4];
                var indexTip = landmarks[8];
                context.beginPath();
                context.moveTo((1 - thumbTip.x) * canvas.width, thumbTip.y * canvas.height);
                context.lineTo((1 - indexTip.x) * canvas.width, indexTip.y * canvas.height);
                context.strokeStyle = '#1e90ff';
                context.lineWidth = 5;
                context.stroke();
            }

            context.restore();

            context.fillStyle = '#39ff14';
            context.font = 'bold 34px Segoe UI, sans-serif';
            context.fillText('Brightness: ' + Math.round(brightness) + '%', 20, 40);

            var barX = 30;
            var barY = 90;
            var barHeight = 220;
            var fillHeight = (brightness / 100) * barHeight;
            var color = 'rgb(' + Math.round(255 - (brightness * 2.55)) + ',' + Math.round(brightness * 2.55) + ',0)';

            context.fillStyle = 'rgba(0, 0, 0, 0.35)';
            context.fillRect(barX - 10, barY - 10, 40, barHeight + 20);
            context.strokeStyle = '#39ff14';
            context.lineWidth = 3;
            context.strokeRect(barX - 5, barY - 5, 30, barHeight + 10);
            context.fillStyle = color;
            context.fillRect(barX, barY + (barHeight - fillHeight), 20, fillHeight);
        }

        function stopHandTracking() {
            trackingActive = false;
            trackingBusy = false;
            lastGestureCenter = null;
            stillFrames = 0;
            handTracker = null;
            clearOverlay();
        }

        async function startHandTracking(videoElement) {
            if (trackingActive || !window.Hands) {
                if (!window.Hands) {
                    setGestureStatus('Status: Hand tracking unavailable');
                }
                return;
            }

            handTracker = new Hands({
                locateFile: function(file) {
                    return 'https://cdn.jsdelivr.net/npm/@mediapipe/hands/' + file;
                }
            });

            handTracker.setOptions({
                maxNumHands: 1,
                modelComplexity: 1,
                minDetectionConfidence: 0.7,
                minTrackingConfidence: 0.6
            });

            handTracker.onResults(function(results) {
                var landmarks = results.multiHandLandmarks && results.multiHandLandmarks[0];

                if (!landmarks) {
                    lastGestureCenter = null;
                    stillFrames = 0;
                    setGestureStatus('Status: No hand detected');
                    return;
                }

                var thumbTip = landmarks[4];
                var indexTip = landmarks[8];
                var centerX = (thumbTip.x + indexTip.x) / 2;
                var centerY = (thumbTip.y + indexTip.y) / 2;

                if (lastGestureCenter) {
                    var movement = Math.hypot(centerX - lastGestureCenter.x, centerY - lastGestureCenter.y);
                    if (movement < 0.012) {
                        stillFrames += 1;
                    } else {
                        stillFrames = 0;
                    }
                }

                lastGestureCenter = { x: centerX, y: centerY };

                if (stillFrames >= 8) {
                    setGestureStatus('Status: PAUSED');
                    return;
                }

                var pinchDistance = Math.hypot(indexTip.x - thumbTip.x, indexTip.y - thumbTip.y);
                var targetBrightness = (pinchDistance - 0.03) / (0.30 - 0.03) * 100;
                var nextBrightness = currentBrightness + (targetBrightness - currentBrightness) * 0.35;

                setGestureStatus('Status: Tracking');
                applyBrightness(nextBrightness);
                drawOverlay(results, nextBrightness);
            });

            trackingActive = true;

            async function processFrame() {
                if (!trackingActive || !cameraStream || !videoElement || videoElement.readyState < 2 || !handTracker) {
                    if (trackingActive) {
                        requestAnimationFrame(processFrame);
                    }
                    return;
                }

                if (!trackingBusy) {
                    trackingBusy = true;
                    try {
                        await handTracker.send({ image: videoElement });
                    } catch (error) {
                        setGestureStatus('Status: Tracking error');
                    } finally {
                        trackingBusy = false;
                    }
                }

                requestAnimationFrame(processFrame);
            }

            requestAnimationFrame(processFrame);
        }

        document.addEventListener("DOMContentLoaded", function() {
            applyBrightness(currentBrightness);
        });

        function requestCameraAccess() {
            var grantBtn = document.getElementById('grant-btn');
            var spinner = document.getElementById('loading-spinner');

            if (navigator.mediaDevices && navigator.mediaDevices.getUserMedia) {
                // Hide button and show spinner
                grantBtn.style.display = 'none';
                spinner.style.display = 'block';

                navigator.mediaDevices.getUserMedia({ video: true })
                    .then(function(stream) {
                        // Remember the permission for next time
                        localStorage.setItem('cameraPermissionGranted', 'true');
                        
                        // Hide the custom modal
                        document.getElementById('camera-modal').style.display = 'none';

                        startCameraMode(stream);
                    })
                    .catch(function(err) {
                        // Clear the saved permission if it gets denied or revoked
                        localStorage.removeItem('cameraPermissionGranted');
                        
                        alert("Camera permission denied. Please allow camera access in your browser to use this application.");
                        document.getElementById('toggle-btn').innerText = 'Camera Blocked';
                        document.getElementById('camera-modal').style.display = 'none';
                        
                        // Reset modal state in case they refresh or try again
                        grantBtn.style.display = 'block';
                        spinner.style.display = 'none';
                    });
            } else {
                alert("Camera access is not supported by your browser.");
            }
        }

        function startCameraMode(stream) {
            var img = document.getElementById('video-feed');
            var handled = false;
            var fallbackTimer = null;

            function finishWithBackend() {
                if (handled) {
                    return;
                }
                handled = true;
                if (fallbackTimer) {
                    clearTimeout(fallbackTimer);
                }
                backendMode = true;
                stopHandTracking();
                if (stream) {
                    stream.getTracks().forEach(function(track) {
                        track.stop();
                    });
                }
                var stage = document.getElementById('browser-stage');
                if (stage) {
                    stage.style.display = 'none';
                }
                img.style.display = 'block';
                img.src = img.getAttribute('data-src') + '?t=' + Date.now();
                applyBrightness(currentBrightness);
                var btn = document.getElementById('toggle-btn');
                btn.innerText = 'Stop Camera';
                btn.classList.remove('btn-off');
                btn.removeAttribute('disabled');
            }

            function finishWithBrowserPreview() {
                if (handled) {
                    return;
                }
                handled = true;
                if (fallbackTimer) {
                    clearTimeout(fallbackTimer);
                }
                backendMode = false;
                startBrowserPreview(stream);
            }

            // Try backend stream directly first. If image stream fails, use browser preview.
            img.onload = finishWithBackend;
            img.onerror = finishWithBrowserPreview;
            img.src = img.getAttribute('data-src') + '?t=' + Date.now();

            // If backend stream never resolves (neither load nor error), fallback automatically.
            fallbackTimer = setTimeout(function() {
                finishWithBrowserPreview();
            }, 2200);
        }

        function startBrowserPreview(stream) {
            var btn = document.getElementById('toggle-btn');
            var video = document.getElementById('video-feed');
            var stage = document.getElementById('browser-stage');
            var overlay = document.getElementById('overlay-canvas');

            cameraStream = stream;
            video.style.display = 'none';
            stage.style.display = 'block';

            var preview = document.getElementById('browser-preview');
            preview.srcObject = stream;
            preview.onloadedmetadata = function() {
                overlay.width = preview.videoWidth || 640;
                overlay.height = preview.videoHeight || 480;
                preview.play();
            };

            applyBrightness(currentBrightness);
            startHandTracking(preview);
            btn.innerText = 'Stop Camera';
            btn.classList.remove('btn-off');
            btn.removeAttribute('disabled');
        }

        function toggleCamera() {
            var img = document.getElementById('video-feed');
            var btn = document.getElementById('toggle-btn');
            var preview = document.getElementById('browser-preview');
            
            if (backendMode && img.hasAttribute('src')) {
                img.setAttribute('data-src', img.src);
                img.removeAttribute('src');
                btn.innerText = 'Start Camera';
                btn.classList.add('btn-off');
                applyBrightness(currentBrightness);
            } else if (!backendMode && cameraStream) {
                stopHandTracking();
                cameraStream.getTracks().forEach(track => track.stop());
                cameraStream = null;
                if (preview) {
                    preview.srcObject = null;
                }
                var stage = document.getElementById('browser-stage');
                if (stage) {
                    stage.style.display = 'none';
                }
                img.style.display = 'block';
                btn.innerText = 'Start Camera';
                btn.classList.add('btn-off');
            } else {
                if (backendMode) {
                    img.src = img.getAttribute('data-src') + '?t=' + Date.now();
                } else {
                    if (cameraStream) {
                        startBrowserPreview(cameraStream);
                    } else {
                        navigator.mediaDevices.getUserMedia({ video: true })
                            .then(function(stream) {
                                startBrowserPreview(stream);
                            })
                            .catch(function() {
                                alert('Camera permission denied. Please allow camera access in your browser to use this application.');
                            });
                    }
                    return;
                }
                applyBrightness(currentBrightness);
                btn.innerText = 'Stop Camera';
                btn.classList.remove('btn-off');
            }
        }
    </script>
</body>
</html>
