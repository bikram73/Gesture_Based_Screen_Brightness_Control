<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gesture Brightness Control</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <!-- Custom Camera Access Modal -->
    <div id="camera-modal" class="modal-overlay">
        <div class="modal">
            <h2>Camera Permission</h2>
            <p>We need access to your camera to detect hand gestures. Please click the button below and then choose <strong>"Allow"</strong> when your browser prompts you.</p>
            <button id="grant-btn" class="btn btn-off" onclick="requestCameraAccess()">Grant Camera Access</button>
            <div id="loading-spinner" class="spinner" style="display: none;"></div>
        </div>
    </div>

    <div class="container">
        <a href="/" class="back-link">&larr; Back to Home</a>
        <h1>Gesture Brightness Control</h1>
        <p class="instructions">Pinch your index finger and thumb to adjust screen brightness.</p>
        <button id="toggle-btn" class="btn btn-off" onclick="toggleCamera()" disabled>Waiting for Camera...</button>
        <p id="mode-message" class="instructions" style="margin-top:-10px; display:none;"></p>
        <div class="video-container">
            <img id="video-feed" data-src="/video_feed" width="640" height="480" alt="Waiting for camera permission...">
        </div>
    </div>

    <script>
        let cameraStream = null;
        let backendMode = true;

        document.addEventListener("DOMContentLoaded", function() {
            // Check if we already have permission from a previous visit
            if (localStorage.getItem('cameraPermissionGranted') === 'true') {
                document.getElementById('camera-modal').style.display = 'none';
                requestCameraAccess(); // Automatically start the feed
            }
        });

        function requestCameraAccess() {
            var grantBtn = document.getElementById('grant-btn');
            var spinner = document.getElementById('loading-spinner');
            var modeMessage = document.getElementById('mode-message');

            if (navigator.mediaDevices && navigator.mediaDevices.getUserMedia) {
                // Hide button and show spinner
                grantBtn.style.display = 'none';
                spinner.style.display = 'block';

                navigator.mediaDevices.getUserMedia({ video: true })
                    .then(function(stream) {
                        // Stop browser stream so OpenCV backend can use the webcam
                        stream.getTracks().forEach(track => track.stop());
                        
                        // Remember the permission for next time
                        localStorage.setItem('cameraPermissionGranted', 'true');
                        
                        // Hide the custom modal
                        document.getElementById('camera-modal').style.display = 'none';
                        
                        // Try backend MJPEG feed first. If it is unavailable on Netlify,
                        // fall back to a local browser camera preview so the page still works.
                        var img = document.getElementById('video-feed');
                        img.src = img.getAttribute('data-src');
                        
                        img.onload = function() {
                            backendMode = true;
                            modeMessage.style.display = 'none';
                            var btn = document.getElementById('toggle-btn');
                            btn.innerText = 'Stop Camera';
                            btn.classList.remove('btn-off');
                            btn.removeAttribute('disabled');
                        };

                        img.onerror = function() {
                            backendMode = false;
                            modeMessage.style.display = 'block';
                            modeMessage.innerText = 'Netlify fallback mode: backend video feed is unavailable, so the browser camera preview is shown instead.';
                            startBrowserPreview();
                        };
                    })
                    .catch(function(err) {
                        // Clear the saved permission if it gets denied or revoked
                        localStorage.removeItem('cameraPermissionGranted');
                        
                        alert("Camera permission denied. Please allow camera access in your browser to use this application.");
                        document.getElementById('toggle-btn').innerText = 'Camera Blocked';
                        document.getElementById('camera-modal').style.display = 'none';
                        
                        // Reset modal state in case they refresh or try again
                        grantBtn.style.display = 'block';
                        spinner.style.display = 'none';
                    });
            } else {
                alert("Camera access is not supported by your browser.");
            }
        }

        function startBrowserPreview() {
            var btn = document.getElementById('toggle-btn');
            var video = document.getElementById('video-feed');

            navigator.mediaDevices.getUserMedia({ video: true })
                .then(function(stream) {
                    cameraStream = stream;
                    video.style.display = 'none';

                    var preview = document.getElementById('browser-preview');
                    if (!preview) {
                        preview = document.createElement('video');
                        preview.id = 'browser-preview';
                        preview.width = 640;
                        preview.height = 480;
                        preview.autoplay = true;
                        preview.playsInline = true;
                        preview.muted = true;
                        preview.style.maxWidth = '100%';
                        preview.style.height = 'auto';
                        video.parentNode.appendChild(preview);
                    }

                    preview.style.display = 'block';
                    preview.srcObject = stream;
                    btn.innerText = 'Stop Camera';
                    btn.classList.remove('btn-off');
                    btn.removeAttribute('disabled');
                })
                .catch(function() {
                    alert('Camera permission denied. Please allow camera access in your browser to use this application.');
                    document.getElementById('camera-modal').style.display = 'none';
                });
        }

        function toggleCamera() {
            var img = document.getElementById('video-feed');
            var btn = document.getElementById('toggle-btn');
            var preview = document.getElementById('browser-preview');
            
            if (backendMode && img.hasAttribute('src')) {
                img.setAttribute('data-src', img.src);
                img.removeAttribute('src');
                btn.innerText = 'Start Camera';
                btn.classList.add('btn-off');
            } else if (!backendMode && cameraStream) {
                cameraStream.getTracks().forEach(track => track.stop());
                cameraStream = null;
                if (preview) {
                    preview.srcObject = null;
                    preview.style.display = 'none';
                }
                btn.innerText = 'Start Camera';
                btn.classList.add('btn-off');
            } else {
                if (backendMode) {
                    img.src = img.getAttribute('data-src');
                } else {
                    startBrowserPreview();
                    return;
                }
                btn.innerText = 'Stop Camera';
                btn.classList.remove('btn-off');
            }
        }
    </script>
</body>
</html>
